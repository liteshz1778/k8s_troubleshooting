apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-deploy
  labels:
    app: python-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      name: python-app-pod
      labels:
        app: python-app
    spec:
      containers:
        - name: python-app-container
          image: liteshz/crashlooptest:v2
          ports:
            - containerPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: python-app-svc
spec:
  type: NodePort
  selector:
    app: python-app
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8000
      nodePort: 32767

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pizza-ordering-sys-deploy
  labels:
    app: pizza-ordering-sys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-ordering-sys
  template:
    metadata:
      name: pizza-ordering-sys-pod
      labels:
        app: pizza-ordering-sys
    spec:
      containers:
        - name: pizza-ordering-sys-container
          image: liteshz/pizza-paradise:v2
          restartPolicy: OnFailure
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: htdocs-data
              mountPath: /usr/local/apache2/htdocs
        - name: busybox
          image: busybox:latest
          command:
            - sh 
            - -c
          args:
            - |
              mkdir -p /usr/local/apache2/htdocs/host
              echo "Running Pod IP: $(hostname -i)" > /usr/local/apache2/htdocs/host/index.html
          volumeMounts:
            - name: htdocs-data
              mountPath: /usr/local/apache2/htdocs
  volumeClaimTemplates:
    - metadata:
        name: htdocs-data
      spec:
        resources:
          requests:
            storage: 1Gi
        accessModes:
          - ReadWriteOnce
        storageClassName: htdocs-sc

---

apiVersion: v1
kind: Service
metadata:
  name: pizza-ordering-sys-headless-svc
spec:
  clusterIP: None
  selector:
    app: pizza-ordering-sys
  ports:
    - name: http
      port: 8080
      targetPort: 80
